name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: mtr-runner-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: mtr-runner-darwin-amd64
          - goos: linux
            goarch: amd64
            name: mtr-runner-linux-amd64
          - goos: windows
            goarch: amd64
            name: mtr-runner-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ${{ matrix.name }} .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
